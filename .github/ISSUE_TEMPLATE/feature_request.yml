name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion. Please describe the feature clearly and concisely.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
      placeholder: Explain the use case...
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Related Area
      description: Which part of the application does this relate to?
      options:
        - label: Dashboard / MAC Change
        - label: Settings
        - label: System Tray
        - label: Startup / Auto-change
        - label: Update
        - label: Localization
        - label: UI / UX
        - label: Other

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Should have
        - Must have
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: Mockup / Pseudocode
      description: Optional - include a mockup, pseudocode, or reference.
      render: shell

  - type: checkboxes
    id: ide
    attributes:
      label: IDE (if you plan to contribute)
      options:
        - label: JetBrains Rider
        - label: Visual Studio
        - label: VS Code
        - label: Other
