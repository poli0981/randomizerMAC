name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the fields below. Be specific and concise.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Affected Area
      description: Which part of the application is affected?
      options:
        - label: Dashboard / MAC Change
        - label: Settings
        - label: System Tray
        - label: Startup / Auto-change
        - label: Update
        - label: Localization
        - label: Logging
        - label: Other

  - type: input
    id: os
    attributes:
      label: OS Version
      description: "e.g., Windows 11 23H2 Build 22631"
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: App Channel
      description: Which release channel are you using?
      options:
        - Stable
        - Dev
        - Beta
        - Canary
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic / minor)
        - Medium (feature partially broken)
        - High (feature completely broken)
        - Critical (app crashes / data loss)
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if applicable.

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: Paste relevant log output (from Log tab or %LOCALAPPDATA%\RandomMac\logs\).
      render: shell

  - type: checkboxes
    id: ide
    attributes:
      label: IDE (if debugging)
      description: Select if you built from source.
      options:
        - label: JetBrains Rider
        - label: Visual Studio
        - label: VS Code
        - label: Other
